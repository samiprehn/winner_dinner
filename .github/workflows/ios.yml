name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build www/
        run: node scripts/build-www.js

      - name: Sync Capacitor (runs pod install)
        run: npx cap sync ios

      # Unsigned build until the Apple Developer account exists — proves the
      # project compiles. TestFlight signing/upload gets added once
      # certificates and App Store Connect keys are in repo secrets.
      - name: Build (unsigned)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App -configuration Release -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO build

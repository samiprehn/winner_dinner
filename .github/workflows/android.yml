name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build www/
        run: node scripts/build-www.js

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Build signed APK and AAB
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload APK (install on a phone to test)
        uses: actions/upload-artifact@v4
        with:
          name: winner-dinner-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload AAB (upload this to Play Console)
        uses: actions/upload-artifact@v4
        with:
          name: winner-dinner-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

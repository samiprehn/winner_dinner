            const dragCardRects = React.useRef([]);
            const listContainerRef = React.useRef(null);
            const [celebration, setCelebration] = useState(null);
            const prevMatchesRef = React.useRef(null);
            const [pullY, setPullY] = useState(0);
            const [refreshing, setRefreshing] = useState(false);
            const pullStartRef = React.useRef(null);
            const navDir = React.useRef('fwd');
            const [sessionsLoaded, setSessionsLoaded] = useState(false);
            const [partyLoaded, setPartyLoaded] = useState(false);
            const uiRef = React.useRef({});
            uiRef.current = { screen, showRestaurantList, celebration, confirmLeave };

            // Auth listener
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((firebaseUser) => {
                    setUser(firebaseUser);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // Android back button: step back through the UI instead of closing the app
            useEffect(() => {
                if (!isNativeApp()) return;
                const App = window.Capacitor.Plugins.App;
                const sub = App.addListener('backButton', () => {
                    const ui = uiRef.current;
                    if (ui.celebration) setCelebration(null);
                    else if (ui.confirmLeave) setConfirmLeave(null);
                    else if (ui.showRestaurantList) setShowRestaurantList(false);
                    else if (ui.screen === 'swipe') { navDir.current = 'back'; setScreen('sessions'); setSessionCode(''); setError(''); }
                    else App.exitApp();
                });
                return () => Promise.resolve(sub).then(h => h.remove());
            }, []);

            // Tapping a push notification jumps straight to that dinner party
            useEffect(() => {
                if (!isNativeApp()) return;
                const FirebaseMessaging = window.Capacitor.Plugins.FirebaseMessaging;
                const sub = FirebaseMessaging.addListener('notificationActionPerformed', (event) => {
                    const code = event.notification?.data?.sessionCode;
                    if (code) {
                        setSessionCode(code);
                        setCurrentIndex(0);
                        navDir.current = 'fwd'; setScreen('swipe');
                    }
                });
                return () => Promise.resolve(sub).then(h => h.remove());
            }, []);

            // Register this device for push notifications (native app only)
            useEffect(() => {
                if (!user || !isNativeApp()) return;
                (async () => {
                    try {
                        const FirebaseMessaging = window.Capacitor.Plugins.FirebaseMessaging;
                        const perm = await FirebaseMessaging.requestPermissions();
                        if (perm.receive !== 'granted') return;
                        const { token } = await FirebaseMessaging.getToken();
                        if (token) await database.ref(`users/${user.uid}/fcmTokens/${token}`).set(true);
                    } catch (e) {
                        console.error('Push registration failed:', e);
                    }
                })();
            }, [user]);

            // Auto-join from invite link
            useEffect(() => {
                if (!user) return;
                const params = new URLSearchParams(window.location.search);
                const joinCode = params.get('join');
                if (!joinCode) return;
                // Clear the URL param
                window.history.replaceState({}, '', window.location.pathname);
                const code = joinCode.toUpperCase().trim();
                (async () => {
                    try {
                        const snap = await database.ref(`sessions/${code}`).once('value');
                        if (snap.exists()) {
                            const data = snap.val();
                            await database.ref(`users/${user.uid}/sessions/${code}`).set({
                                name: data.name || code,
                                joinedAt: Date.now()
                            });
                            const isNewMember = !(data.participants || {})[user.uid];
                            await database.ref(`sessions/${code}/participants/${user.uid}`).set(user.displayName || 'Anonymous');
                            if (isNewMember) sendPush(code, { event: 'join' });
                            setSessionCode(code);
                            setCurrentIndex(0);
                            navDir.current = 'fwd'; setScreen('swipe');
                        } else {
                            setError('Session not found. The invite link may be invalid.');
                        }
                    } catch (err) {
                        setError('Could not join session.');
                        console.error(err);
                    }
                })();
            }, [user]);

            // Load user's sessions list
            useEffect(() => {
                if (!user) return;
                const ref = database.ref(`users/${user.uid}/sessions`);
                ref.on('value', (snap) => { setUserSessions(snap.val() || {}); setSessionsLoaded(true); });
                return () => ref.off();
            }, [user]);

            // Load participants and names for each session (for home screen display)
            useEffect(() => {
                if (!user) return;
                const codes = Object.keys(userSessions);
                if (codes.length === 0) { setSessionParticipants({}); return; }
                
                const listeners = [];
                codes.forEach(code => {
                    const ref = database.ref(`sessions/${code}`);
                    const handler = ref.on('value', (snap) => {
                        const data = snap.val() || {};
                        setSessionParticipants(prev => ({
                            ...prev,
                            [code]: {
                                names: Object.values(data.participants || {}),
                                sessionName: data.name || code
                            }
                        }));
                    });
                    listeners.push({ ref, handler });
                });
                return () => listeners.forEach(({ ref, handler }) => ref.off('value', handler));
            }, [user, Object.keys(userSessions).join(',')]);

            // Session data listener
            useEffect(() => {
                if (!sessionCode || screen !== 'swipe' || !user) return;
                
                const sessionRef = database.ref(`sessions/${sessionCode}`);
                prevMatchesRef.current = null; // first snapshot sets the celebration baseline
                setPartyLoaded(false);

                // Register as participant
                database.ref(`sessions/${sessionCode}/participants/${user.uid}`)
                    .set(user.displayName || 'Anonymous')
                    .catch(err => console.error('Participant write failed:', err));
                
                sessionRef.on('value', (snap) => {
                    const data = snap.val();
                    setPartyLoaded(true);
                    if (data) {
                        setRestaurants(data.restaurants || []);
                        setNarrowedList(data.narrowed || null);
                        setCurrentSessionName(data.name || sessionCode);
                        const votes = data.votes || {};
                        const parts = data.participants || {};
                        setAllVotes(votes);
                        setUserVotes(votes[user.uid] || {});
                        setParticipants(parts);
                        calculateMatches(data.restaurants || [], votes, parts);
                    }
                });
                return () => sessionRef.off();
            }, [sessionCode, screen, user]);

            const signInWithGoogle = async () => {
                setLoading(true);
                setError('');
                try {
                    await googleSignIn();
                } catch (err) {
                    if (!isCancelledSignIn(err)) {
                        setError('Sign in failed. Please try again.');
                    }
                } finally {
                    setLoading(false);
                }
            };

            const signOut = async () => {
                await auth.signOut();
                setScreen('sessions');
                setSessionCode('');
            };

            const generateCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();

            const createSession = async () => {
                if (!sessionName.trim() || !user || loading) return;
                setLoading(true);
                setError('');
                const code = generateCode();
                try {
                    await database.ref(`sessions/${code}`).set({
                        name: sessionName.trim(),
                        createdBy: user.uid,
                        restaurants: [],
                        votes: {},
                        participants: { [user.uid]: user.displayName || 'Anonymous' }
                    });
                    await database.ref(`users/${user.uid}/sessions/${code}`).set({
                        name: sessionName.trim(),
                        joinedAt: Date.now()
                    });
                    setSessionCode(code);
                    setSessionName('');
                    setShowCreate(false);
                    setCurrentIndex(0);
                    navDir.current = 'fwd'; setScreen('swipe');
                } catch (err) {
                    setError('Failed to create session.');
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const joinSession = async () => {
                if (!inputCode.trim() || !user || loading) return;
                setLoading(true);
                setError('');
                const code = inputCode.toUpperCase().trim();
                try {
                    const snap = await database.ref(`sessions/${code}`).once('value');
                    if (snap.exists()) {
                        const data = snap.val();
                        await database.ref(`users/${user.uid}/sessions/${code}`).set({
                            name: data.name || code,
                            joinedAt: Date.now()
                        });
                        const isNewMember = !(data.participants || {})[user.uid];
                        await database.ref(`sessions/${code}/participants/${user.uid}`).set(user.displayName || 'Anonymous');
                        if (isNewMember) sendPush(code, { event: 'join' });
                        setSessionCode(code);
                        setInputCode('');
                        setCurrentIndex(0);
                        navDir.current = 'fwd'; setScreen('swipe');
                    } else {
                        setError('Session not found. Check the code.');
                    }
                } catch (err) {
                    setError('Could not join session.');
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const leaveSession = async (code) => {
                try {
                    await database.ref(`users/${user.uid}/sessions/${code}`).remove();
                    await database.ref(`sessions/${code}/participants/${user.uid}`).remove();
                    await database.ref(`sessions/${code}/votes/${user.uid}`).remove();
                    setConfirmLeave(null);
                } catch (err) {
                    setError('Failed to leave session.');
                    console.error(err);
                }
            };

            // Drag-to-reorder session cards
            const handleDragStart = (code, idx, clientY) => {
                longPressTimer.current = setTimeout(() => {
                    dragStartY.current = clientY;
                    // Capture card positions
                    if (listContainerRef.current) {
                        const cards = listContainerRef.current.querySelectorAll('[data-session-card]');
                        dragCardRects.current = Array.from(cards).map(c => {
                            const r = c.getBoundingClientRect();
                            return { top: r.top, bottom: r.bottom, mid: r.top + r.height / 2 };
                        });
                    }
                    setDragState({ code, fromIndex: idx, toIndex: idx, offsetY: 0 });
                    if (navigator.vibrate) navigator.vibrate(30);
                }, 500);
            };

            const handleDragMove = (clientY) => {
                if (!dragState) return;
                const offsetY = clientY - dragStartY.current;
                // Figure out which slot we're over
                const currentMid = dragCardRects.current[dragState.fromIndex]?.mid + offsetY;
                let toIndex = dragState.fromIndex;
                for (let i = 0; i < dragCardRects.current.length; i++) {
                    if (currentMid < dragCardRects.current[i].mid) {
                        toIndex = i;
                        break;
                    }
                    toIndex = i;
                }
                setDragState(prev => ({ ...prev, offsetY, toIndex }));
            };

            const handleDragEnd = async () => {
                clearTimeout(longPressTimer.current);
                if (!dragState || dragState.fromIndex === dragState.toIndex) {
                    setDragState(null);
                    return;
                }
                // Reorder entries and save new sortOrder values
                const entries = Object.entries(userSessions).sort((a, b) => (a[1].sortOrder ?? Infinity) - (b[1].sortOrder ?? Infinity) || (b[1].joinedAt || 0) - (a[1].joinedAt || 0));
                const codes = entries.map(e => e[0]);
                const moved = codes.splice(dragState.fromIndex, 1)[0];
                codes.splice(dragState.toIndex, 0, moved);
                const updates = {};
                codes.forEach((c, i) => {
                    updates[`users/${user.uid}/sessions/${c}/sortOrder`] = i;
                });
                setDragState(null);
                try {
                    await database.ref().update(updates);
                } catch (err) {
                    setError('Failed to reorder.');
                }
            };

            const cancelDrag = () => {
                clearTimeout(longPressTimer.current);
                if (!dragState) return;
                setDragState(null);
            };

            // Pull-to-refresh on the sessions list (data is realtime; this re-reads
            // once and gives the reassuring spinner people expect from apps)
            const refreshSessions = async () => {
                try {
                    const snap = await database.ref(`users/${user.uid}/sessions`).once('value');
                    setUserSessions(snap.val() || {});
                    await new Promise(r => setTimeout(r, 600));
                } catch (e) { /* listeners keep data fresh regardless */ }
                setRefreshing(false);
            };

            const handlePullStart = (e) => {
                pullStartRef.current = window.scrollY <= 0 ? e.touches[0].clientY : null;
            };
            const handlePullMove = (e) => {
                if (pullStartRef.current === null || dragState || refreshing) return;
                const dy = e.touches[0].clientY - pullStartRef.current;
                if (dy > 10) {
                    clearTimeout(longPressTimer.current);
                    setPullY(Math.min((dy - 10) * 0.4, 70));
                }
            };
            const handlePullEnd = () => {
                if (pullY >= 55 && !refreshing) {
                    setRefreshing(true);
                    haptic('light');
                    refreshSessions();
                }
                setPullY(0);
                pullStartRef.current = null;
            };

            const openSession = (code) => {
                setSessionCode(code);
                setCurrentIndex(0);
                setError('');
                navDir.current = 'fwd'; setScreen('swipe');
            };

            const inviteFriends = async () => {
                const url = `${window.location.origin}${window.location.pathname}?join=${sessionCode}`;
                const text = `Join my dinner party on Winner Dinner!\n${url}`;
                if (navigator.share) {
                    try {
                        await navigator.share({ title: 'Winner Dinner', text });
                    } catch (e) { /* user cancelled */ }
                } else {
                    navigator.clipboard.writeText(url);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                }
            };

            const goBack = () => {
                navDir.current = 'back';
                setScreen('sessions');
                setSessionCode('');
                setError('');
            };

            const toVoteKey = s => s.replace(/\./g, '%2E').replace(/#/g, '%23').replace(/\$/g, '%24').replace(/\[/g, '%5B').replace(/\]/g, '%5D').replace(/\//g, '%2F');

            const getMatches = (restaurantList, votes, parts) => {
                const uids = Object.keys(parts);
                if (uids.length < 2) return [];
                return restaurantList.filter(r =>
                    uids.every(u => votes[u]?.[toVoteKey(r)] === true || votes[u]?.[toVoteKey(r)] === 'super')
                );
            };

            const calculateMatches = (restaurantList, votes, parts) => {
                const uids = Object.keys(parts);
                const matched = getMatches(restaurantList, votes, parts);
                // Celebrate matches that appear after the first snapshot
                if (prevMatchesRef.current) {
                    const fresh = matched.filter(r => !prevMatchesRef.current.includes(r));
                    if (fresh.length > 0) {
                        setCelebration(fresh[0]);
                        haptic('success');
                    }
                }
                prevMatchesRef.current = matched.slice();
                matched.sort((a, b) => {
                    const superA = uids.filter(u => votes[u]?.[toVoteKey(a)] === 'super').length;
                    const superB = uids.filter(u => votes[u]?.[toVoteKey(b)] === 'super').length;
                    return superB - superA;
                });
                setMatches(matched);
            };

            // One-time swipe tutorial for touch users
            useEffect(() => {
                if (screen === 'swipe' && isTouchDevice && !localStorage.getItem('wdSwipeHintSeen')) {
                    setShowSwipeHint(true);
                }
            }, [screen]);
            const dismissSwipeHint = () => {
                setShowSwipeHint(false);
                try { localStorage.setItem('wdSwipeHintSeen', '1'); } catch (e) {}
            };

            // Celebration auto-dismisses
            useEffect(() => {
                if (!celebration) return;
                const t = setTimeout(() => setCelebration(null), 5000);
                return () => clearTimeout(t);
            }, [celebration]);

            const confetti = React.useMemo(() => !celebration ? [] :
                Array.from({ length: 50 }, () => ({
                    left: Math.random() * 100,
                    color: ['#e11d48', '#9333ea', '#22c55e', '#f59e0b', '#ffd700', '#3b82f6'][Math.floor(Math.random() * 6)],
                    duration: 2.5 + Math.random() * 2,
                    delay: Math.random() * 0.8,
                })), [celebration]);

            const addRestaurant = async (nameOverride) => {
                const name = (nameOverride || newRestaurant).trim();
                if (!name) return;
                setError('');
                try {
                    const snap = await database.ref(`sessions/${sessionCode}`).once('value');
                    const data = snap.val();
                    if (!data) { setError('Session not found.'); return; }
                    const list = data.restaurants || [];
                    if (!list.includes(name)) {
                        list.push(name);
                        await database.ref(`sessions/${sessionCode}/restaurants`).set(list);
                        sendPush(sessionCode, { event: 'added', count: 1 });
                        if (!nameOverride) setNewRestaurant('');
                    } else {
                        setError('Already in the list.');
                    }
                } catch (err) {
                    setError(`Failed to add: ${err.message}`);
                }
            };

            const toggleResult = (name) => {
                setSelectedResults(prev => {
                    const next = new Set(prev);
                    if (next.has(name)) next.delete(name);
                    else next.add(name);
                    return next;
                });
            };

            const addSelectedRestaurants = async () => {
                if (selectedResults.size === 0) return;
                setError('');
                try {
                    const snap = await database.ref(`sessions/${sessionCode}`).once('value');
                    const data = snap.val();
                    if (!data) { setError('Session not found.'); return; }
                    const list = data.restaurants || [];
                    let added = 0;
                    selectedResults.forEach(name => {
                        if (!list.includes(name)) {
                            list.push(name);
                            added++;
                        }
                    });
                    if (added > 0) {
                        await database.ref(`sessions/${sessionCode}/restaurants`).set(list);
                        sendPush(sessionCode, { event: 'added', count: added });
                    }
                    setSelectedResults(new Set());
                    setSearchResults([]);
                    setAddMode('manual');
                    setNewRestaurant('');
                } catch (err) {
                    setError(`Failed to add: ${err.message}`);
                }
            };

            const selectAllResults = () => {
                if (selectedResults.size === searchResults.length) {
                    setSelectedResults(new Set());
                } else {
                    setSelectedResults(new Set(searchResults.map(r => r.name)));
                }
            };

            const requestLocation = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => setUserLocation(`${pos.coords.latitude},${pos.coords.longitude}`),
                        () => console.log('Location denied, search will work without it'),
                        { timeout: 5000 }
                    );
                }
            };

            const parseGoogleResults = (data, userLat, userLng) => {
                if (!data.places) return [];
                return data.places.map(p => {
                    const lat = p.location?.latitude;
                    const lng = p.location?.longitude;
                    let distance = null;
                    if (lat && lng && userLat && userLng) {
                        distance = getDistanceMiles(userLat, userLng, lat, lng);
                    }
                    return {
                        name: p.displayName?.text || '',
                        address: p.formattedAddress || '',
                        category: p.primaryTypeDisplayName?.text || '',
                        distance
                    };
                }).filter(r => r.name);
            };

            const getDistanceMiles = (lat1, lon1, lat2, lon2) => {
                const R = 3958.8;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            };

            const searchRestaurants = async () => {
                if (newRestaurant.trim().length < 2) {
                    setSearchResults([]);
                    return;
                }
                setSearchLoading(true);
                try {
                    const locText = searchLocation.trim();
                    const query = locText ? `${newRestaurant.trim()} near ${locText}` : newRestaurant.trim();
                    const params = new URLSearchParams({ mode: 'search', query, limit: '20', radius: '32187' });
                    const ll = userLocation ? userLocation.split(',') : null;
                    if (!locText && ll) { params.set('lat', ll[0]); params.set('lng', ll[1]); }
                    const res = await fetch(`${PROXY_URL}?${params}`);
                    const data = await res.json();
                    const userLat = ll ? parseFloat(ll[0]) : null;
                    const userLng = ll ? parseFloat(ll[1]) : null;
                    let results = parseGoogleResults(data, userLat, userLng);
                    if (!locText) {
                        results.sort((a, b) => (a.distance || 999) - (b.distance || 999));
                    }
                    setSearchResults(results);
                } catch (err) {
                    console.error('Search failed:', err);
                    setError('Search failed. Try again.');
                } finally {
                    setSearchLoading(false);
                }
            };

            const browseNearby = async () => {
                if (!userLocation) {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(
                            (pos) => {
                                const ll = `${pos.coords.latitude},${pos.coords.longitude}`;
                                setUserLocation(ll);
                                doBrowse(ll);
                            },
                            () => setError('Location access needed to browse nearby restaurants.'),
                            { timeout: 5000 }
                        );
                    } else {
                        setError('Location not supported on this device.');
                    }
                    return;
                }
                doBrowse(userLocation);
            };

            const doBrowse = async (ll) => {
                setSearchLoading(true);
                setAddMode('nearby');
                setNewRestaurant('');
                setSelectedResults(new Set());
                try {
                    const [lat, lng] = ll.split(',');
                    const params = new URLSearchParams({ mode: 'browse', lat, lng, limit: '20', radius: '32187' });
                    const res = await fetch(`${PROXY_URL}?${params}`);
                    const data = await res.json();
                    let results = parseGoogleResults(data, parseFloat(lat), parseFloat(lng));
                    results.sort((a, b) => (a.distance || 999) - (b.distance || 999));
                    setSearchResults(results);
                } catch (err) {
                    console.error('Browse failed:', err);
                    setError('Failed to load nearby restaurants.');
                } finally {
                    setSearchLoading(false);
                }
            };

            const cuisineTypes = [
                'American', 'BBQ', 'Breakfast', 'Burgers', 'Chinese', 'Dessert',
                'French', 'Greek', 'Ice Cream', 'Indian', 'Italian', 'Japanese',
                'Korean', 'Med', 'Mexican', 'Pizza', 'Sushi', 'Thai', 'Vietnamese'
            ];

            const browseByCuisine = async (cuisine) => {
                setSelectedCuisine(cuisine);
                // Scroll to top when switching cuisines
                window.scrollTo({ top: 0, behavior: 'smooth' });
                if (!userLocation) {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(
                            (pos) => {
                                const ll = `${pos.coords.latitude},${pos.coords.longitude}`;
                                setUserLocation(ll);
                                doBrowseCuisine(ll, cuisine);
                            },
                            () => setError('Location access needed to browse by cuisine.'),
                            { timeout: 5000 }
                        );
                    } else {
                        setError('Location not supported on this device.');
                    }
                    return;
                }
                doBrowseCuisine(userLocation, cuisine);
            };

            const doBrowseCuisine = async (ll, cuisine) => {
                setSearchLoading(true);
                setNewRestaurant('');
                setSelectedResults(new Set());
                try {
                    const [lat, lng] = ll.split(',');
                    const params = new URLSearchParams({
                        mode: 'search',
                        query: `${cuisine} restaurant`,
                        lat,
                        lng,
                        limit: '20',
                        radius: '32187'
                    });
                    const res = await fetch(`${PROXY_URL}?${params}`);
                    const data = await res.json();
                    let results = parseGoogleResults(data, parseFloat(lat), parseFloat(lng));
                    results.sort((a, b) => (a.distance || 999) - (b.distance || 999));
                    setSearchResults(results);
                } catch (err) {
                    console.error('Browse cuisine failed:', err);
                    setError('Failed to load restaurants.');
                } finally {
                    setSearchLoading(false);
                }
            };

            const deleteRestaurant = async (restaurantName) => {
                setError('');
                try {
                    const snap = await database.ref(`sessions/${sessionCode}`).once('value');
                    const data = snap.val();
                    if (!data) return;
                    const list = (data.restaurants || []).filter(r => r !== restaurantName);
                    await database.ref(`sessions/${sessionCode}/restaurants`).set(list);
                    
                    // Clean up votes for this restaurant from all voters
                    const votes = data.votes || {};
                    const updates = {};
                    Object.keys(votes).forEach(voterUid => {
                        if (votes[voterUid] && votes[voterUid][toVoteKey(restaurantName)] !== undefined) {
                            updates[`votes/${voterUid}/${toVoteKey(restaurantName)}`] = null;
                        }
                    });
                    if (Object.keys(updates).length > 0) {
                        await database.ref(`sessions/${sessionCode}`).update(updates);
                    }
                    
                    // Adjust current index if needed
                    if (currentIndex >= list.length && list.length > 0) {
                        setCurrentIndex(list.length - 1);
                    } else if (list.length === 0) {
                        setCurrentIndex(0);
                    }
                } catch (err) {
                    setError(`Failed to delete: ${err.message}`);
                }
            };

            const renameSession = async () => {
                if (!editNameValue.trim()) return;
                setError('');
                try {
                    const newName = editNameValue.trim();
                    await database.ref(`sessions/${sessionCode}/name`).set(newName);
                    await database.ref(`users/${user.uid}/sessions/${sessionCode}/name`).set(newName);
                    setEditingName(false);
                } catch (err) {
                    setError(`Failed to rename: ${err.message}`);
                }
            };

            const currentRestaurant = () => {
                const activeList = narrowedList || restaurants;
                const unvoted = activeList.filter(r => userVotes[toVoteKey(r)] === undefined);
                const unvotedNotSkipped = unvoted.filter(r => !skipped.includes(r));
                return unvotedNotSkipped.length > 0 ? unvotedNotSkipped[0] : skipped.find(r => userVotes[toVoteKey(r)] === undefined);
            };

            const castVote = async (restaurant, liked, fromSwipe = false) => {
                if (!restaurant) return;
                haptic(liked === 'super' ? 'medium' : 'light');
                setSkipped(prev => prev.filter(r => r !== restaurant));
                setUserVotes(prev => ({ ...prev, [toVoteKey(restaurant)]: liked }));
                if (fromSwipe) {
                    clearTimeout(undoTimer.current);
                    setUndoInfo({ restaurant, value: liked });
                    undoTimer.current = setTimeout(() => setUndoInfo(null), 4000);
                }
                // If this vote just completed a match, notify the others
                if (liked === true || liked === 'super') {
                    const before = getMatches(restaurants, allVotes, participants);
                    const myVotes = { ...(allVotes[user.uid] || {}), [toVoteKey(restaurant)]: liked };
                    const after = getMatches(restaurants, { ...allVotes, [user.uid]: myVotes }, participants);
                    after.filter(r => !before.includes(r)).forEach(r => sendPush(sessionCode, { event: 'match', restaurant: r }));
                }
                try {
                    await database.ref(`sessions/${sessionCode}/votes/${user.uid}`).update({ [toVoteKey(restaurant)]: liked });
                } catch (err) {
                    console.error('Vote save error:', err);
                    setError('Failed to save vote.');
                }
            };

            const vote = (liked) => castVote(currentRestaurant(), liked);

            const undoVote = async () => {
                if (!undoInfo) return;
                clearTimeout(undoTimer.current);
                const { restaurant } = undoInfo;
                setUndoInfo(null);
                haptic('light');
                setUserVotes(prev => {
                    const next = { ...prev };
                    delete next[toVoteKey(restaurant)];
                    return next;
                });
                try {
                    await database.ref(`sessions/${sessionCode}/votes/${user.uid}`).update({ [toVoteKey(restaurant)]: null });
                } catch (err) {
                    setError('Failed to undo.');
                }
            };

            const skip = () => {
                const activeList = narrowedList || restaurants;
                const unvoted = activeList.filter(r => userVotes[toVoteKey(r)] === undefined);
                const notSkipped = unvoted.filter(r => !skipped.includes(r));
                const restaurant = notSkipped[0] ?? skipped.find(r => userVotes[toVoteKey(r)] === undefined);
                if (!restaurant) return;
                haptic('light');
                setSkipped(prev => [...prev.filter(r => r !== restaurant), restaurant]);
            };

            const resetVotes = async () => {
                setUserVotes({});
                setSkipped([]);
                setCurrentIndex(0);
                try {
                    await database.ref(`sessions/${sessionCode}/votes/${user.uid}`).set({});
                    await database.ref(`sessions/${sessionCode}/narrowed`).remove();
                } catch (err) {
                    console.error(err);
                }
            };

            const narrowDown = async () => {
                try {
                    await database.ref(`sessions/${sessionCode}/narrowed`).set(matches);
                    await database.ref(`sessions/${sessionCode}/votes/${user.uid}`).set({});
                    setUserVotes({});
                } catch (err) {
                    setError('Failed to narrow down.');
                    console.error(err);
                }
            };

            // Non-passive touch listener for drag reorder (prevents scroll during drag)
            useEffect(() => {
                const el = listContainerRef.current;
                if (!el) return;
                const onTouchMove = (e) => {
                    if (dragState) {
                        e.preventDefault();
                        handleDragMove(e.touches[0].clientY);
                    }
                };
                el.addEventListener('touchmove', onTouchMove, { passive: false });
                return () => el.removeEventListener('touchmove', onTouchMove);
            }, [dragState]);

            // Swipe-to-vote: right = yes, left = no, up = super like.
            // Touch-only by design — desktop stays click-driven.
            const getSwipeCandidate = (dx, dy) =>
                dy < -80 && Math.abs(dy) > Math.abs(dx) ? 'super'
                : dx > 90 ? 'yes'
                : dx < -90 ? 'no'
                : null;

            const handleTouchStart = (e) => {
                if (flyingRef.current) return;
                touchStartRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                setSwiping(true);
            };
            const handleTouchMove = (e) => {
                if (!touchStartRef.current || flyingRef.current) return;
                e.preventDefault();
                const dx = e.touches[0].clientX - touchStartRef.current.x;
                const dy = e.touches[0].clientY - touchStartRef.current.y;
                setSwipeX(dx);
                setSwipeY(dy);
                const cand = getSwipeCandidate(dx, dy);
                if (cand !== candRef.current) {
                    candRef.current = cand;
                    setCandidate(cand);
                    if (cand) haptic('light'); // tick when crossing the commit threshold
                }
            };
            const resetSwipe = () => {
                setSwipeX(0); setSwipeY(0); setSwiping(false);
                setCandidate(null); candRef.current = null;
                touchStartRef.current = null;
            };
            const handleTouchEnd = () => {
                const cand = candRef.current;
                if (!cand) { resetSwipe(); return; }
                const restaurant = currentRestaurant();
                if (!restaurant) { resetSwipe(); return; }
                flyingRef.current = true;
                setFlying(cand);
                touchStartRef.current = null;
                setTimeout(() => {
                    castVote(restaurant, cand === 'yes' ? true : cand === 'no' ? false : 'super', true);
                    flyingRef.current = false;
                    setFlying(null);
                    resetSwipe();

            useEffect(() => {
                const el = cardRef.current;
                if (!el) return;
                el.addEventListener('touchstart', handleTouchStart, { passive: true });
                el.addEventListener('touchmove', handleTouchMove, { passive: false });
                el.addEventListener('touchend', handleTouchEnd, { passive: true });
                return () => {
                    el.removeEventListener('touchstart', handleTouchStart);
                    el.removeEventListener('touchmove', handleTouchMove);
                    el.removeEventListener('touchend', handleTouchEnd);

            const getVoterStatus = (restaurant) => {

                                                    zIndex: isDragging ? 50 : 1,

                                                onMouseDown={(e) => { if (e.button === 0 && !confirmLeave) handleDragStart(code, idx, e.clientY); }}
                                                onMouseUp={() => clearTimeout(longPressTimer.current)}
                                                onTouchStart={(e) => { if (!confirmLeave) handleDragStart(code, idx, e.touches[0].clientY); }}
                                                onTouchEnd={() => clearTimeout(longPressTimer.current)}
                                            >
                                                <div className="flex items-center justify-between">

                                                            <p className="text-white/30 text-sm mt-1">{names.join(', ')}</p>

                                                    </div>
                                                    <button onClick={() => setConfirmLeave(code)} className="text-white/20 hover:text-red-400 transition-colors ml-3">
                                                        <TrashIcon className="w-4 h-4" />
                                                    </button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            ) : (

                            <div className="text-center mt-8 mb-4 text-white/30 text-sm">
                                <a href="https://buymeacoffee.com/samiprehn" target="_blank" rel="noopener noreferrer" className="hover:text-white/60 transition-colors" style={{textDecoration:'none'}}>🍽️ Keep this page running</a>
                                <span className="mx-2 opacity-60">|</span>
                                <a href="https://samiprehn.github.io/" target="_blank" rel="noopener noreferrer" className="hover:text-white/60 transition-colors" style={{textDecoration:'none'}}>Sami's other sites →</a>
                            </div>

                        {/* Leave-party bottom sheet */}
                        {confirmLeave && (

                                    <div className="sheet-handle"></div>
                                    <h3 className="text-white font-semibold text-lg mb-1">
                                        Leave {(sessionParticipants[confirmLeave]?.sessionName) || userSessions[confirmLeave]?.name || 'this party'}?
                                    </h3>

                                    <button onClick={() => { haptic('medium'); leaveSession(confirmLeave); }}

                                        Cancel

            if (screen === 'swipe') {
                const activeList = narrowedList || restaurants;
                const unvoted = activeList.filter(r => userVotes[toVoteKey(r)] === undefined);
                const unvotedNotSkipped = unvoted.filter(r => !skipped.includes(r));
                const cur = unvotedNotSkipped.length > 0 ? unvotedNotSkipped[0] : (skipped.find(r => userVotes[toVoteKey(r)] === undefined) || null);
                const allDone = activeList.length > 0 && unvoted.length === 0;

                const status = cur ? getVoterStatus(cur) : null;

                return (
                    <div key="swipe" className="min-h-screen p-4 relative z-10 screen-fwd">
                        {celebration && (

                                <div className="text-center px-8 pop-in">
                                    <p className="text-6xl mb-4">🎉</p>

                        <div className="max-w-md mx-auto pt-4">

                                                onKeyPress={(e) => e.key === 'Enter' && renameSession()}
                                                className="bg-white/5 border border-white/10 text-white px-3 py-1.5 rounded-lg text-lg font-semibold w-full"

                                            <button onClick={renameSession} className="text-green-400 hover:text-green-300 transition-colors">

                                                        className={`py-2 px-3 rounded-lg text-sm font-medium transition-colors ${
                                                            selectedCuisine === cuisine
                                                                ? 'bg-purple-500/30 text-purple-300 border border-purple-400/50'
                                                                : 'bg-white/5 text-white/60 hover:bg-white/10 hover:text-white/80 border border-white/10'
                                                        }`}
                                                    >
                                                        {cuisine}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                    {addMode !== 'nearby' && addMode !== 'cuisine' && (
                                        <div className="flex gap-2">
                                            <input
                                                type="text"
                                                placeholder={addMode === 'search' ? "Type, name, or keyword..." : "Restaurant name"}
                                                value={newRestaurant}
                                                onChange={(e) => setNewRestaurant(e.target.value)}
                                                onKeyPress={(e) => e.key === 'Enter' && (addMode === 'search' ? searchRestaurants() : addRestaurant())}
                                                className="flex-1 min-w-0 bg-white/5 border border-white/10 text-white px-3 py-3 rounded-xl placeholder-white/20"
                                            />
                                            {addMode === 'manual' ? (
                                                <button onClick={() => addRestaurant()} className="bg-white/10 hover:bg-white/15 text-white px-3 py-3 rounded-xl transition-colors flex-shrink-0">
                                                    <PlusIcon className="w-5 h-5" />
                                                </button>
                                            ) : (
                                                <button onClick={searchRestaurants} className="bg-purple-500/20 hover:bg-purple-500/30 text-purple-400 px-3 py-3 rounded-xl transition-colors flex-shrink-0">
                                                    <SearchIcon className="w-5 h-5" />
                                                </button>
                                            )}
                                        </div>
                                    )}
                                    {addMode === 'search' && (
                                        <div className="mt-2">
                                            <input
                                                type="text"
                                                placeholder="City, state, or zip (optional)"
                                                value={searchLocation}
                                                onChange={(e) => setSearchLocation(e.target.value)}
                                                onKeyPress={(e) => e.key === 'Enter' && searchRestaurants()}
                                                className="w-full bg-white/5 border border-white/10 text-white px-3 py-2.5 rounded-xl placeholder-white/20 text-sm"
                                            />
                                        </div>
                                    )}
                                    {/* Search/Browse Results */}
                                    {(addMode === 'search' || addMode === 'nearby' || addMode === 'cuisine') && searchResults.length > 0 && (
                                        <div className="mt-3">
                                            <div className="flex items-center justify-between mb-2">
                                                <button
                                                    onClick={selectAllResults}
                                                    className="text-xs text-white/30 hover:text-white/50 transition-colors"
                                                >
                                                    {selectedResults.size === searchResults.length ? 'Deselect all' : 'Select all'}
                                                </button>
                                                {selectedResults.size > 0 && (
                                                    <button
                                                        onClick={addSelectedRestaurants}
                                                        className="text-xs bg-purple-500/20 text-purple-400 hover:bg-purple-500/30 px-3 py-1.5 rounded-lg transition-colors font-medium"
                                                    >
                                                        Add {selectedResults.size} restaurant{selectedResults.size !== 1 ? 's' : ''}
                                                    </button>
                                                )}
                                            </div>
                                            <div className="space-y-1.5 max-h-80 overflow-y-auto">
                                                {searchResults.map((r, i) => {
                                                    const isSelected = selectedResults.has(r.name);
                                                    return (
                                                        <div
                                                            key={i}
                                                            className={`w-full text-left rounded-xl px-3 py-2.5 transition-colors flex items-start gap-3 ${isSelected ? 'bg-purple-500/15 border border-purple-500/20' : 'bg-white/5 hover:bg-white/10'}`}
                                                        >
                                                            <button onClick={() => toggleResult(r.name)} className={`w-5 h-5 rounded-md border-2 flex items-center justify-center flex-shrink-0 mt-0.5 transition-colors cursor-pointer ${isSelected ? 'bg-purple-500 border-purple-500' : 'border-white/20 hover:border-white/40'}`}>
                                                                {isSelected && (
                                                                    <svg className="w-3 h-3 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3">
                                                                        <polyline points="20 6 9 17 4 12"/>
                                                                    </svg>
                                                                )}
                                                            </button>
                                                            <div className="min-w-0 flex-1">
                                                                <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.name + (r.address ? ' ' + r.address : ''))}`} target="_blank" rel="noopener noreferrer" className="text-white/80 text-sm font-medium truncate block hover:underline">{r.name}</a>
                                                                {r.address && <p className="text-white/30 text-xs truncate">{r.address}</p>}
                                                                <div className="flex items-center gap-2 mt-0.5">
                                                                    {r.category && <span className="text-white/20 text-xs">{r.category}</span>}
                                                                    {r.distance != null && <span className="text-white/20 text-xs">· {r.distance.toFixed(1)} mi</span>}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                    {(addMode === 'search' || addMode === 'nearby' || addMode === 'cuisine') && searchLoading && (
                                        <div className="mt-3 space-y-1.5">
                                            {[0, 1, 2, 3].map(i => (
                                                <div key={i} className="rounded-xl px-3 py-2.5 skeleton" style={{animationDelay: `${i * 0.12}s`}}>
                                                    <div className="h-4 w-1/2 rounded bg-white/10 mb-1.5"></div>
                                                    <div className="h-3 w-3/4 rounded bg-white/5"></div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    {addMode === 'search' && newRestaurant.length >= 2 && !searchLoading && searchResults.length === 0 && (
                                        <p className="text-white/20 text-xs mt-3 text-center">No results found</p>
                                    )}
                                    {addMode === 'cuisine' && selectedCuisine && !searchLoading && searchResults.length === 0 && (
                                        <p className="text-white/20 text-xs mt-3 text-center">No {selectedCuisine} restaurants found nearby</p>
                                    )}
                                </div>
                            </div>
                            {/* Voting */}
                            {restaurants.length > 0 && (
                                <div className="flex gap-2 mb-4">
                                    <button onClick={() => setBrowseMode(false)}
                                        className={`flex-1 text-xs py-2 rounded-xl font-medium transition-colors ${!browseMode ? 'bg-white/15 text-white' : 'bg-white/5 text-white/30 hover:text-white/50'}`}>
                                        Vote
                                    </button>
                                    <button onClick={() => setBrowseMode(true)}
                                        className={`flex-1 text-xs py-2 rounded-xl font-medium transition-colors ${browseMode ? 'bg-white/15 text-white' : 'bg-white/5 text-white/30 hover:text-white/50'}`}>
                                        Browse ({activeList.length})
                                    </button>
                                </div>
                            )}
                            {!partyLoaded ? (
                                <div className="rounded-2xl overflow-hidden card-glow">
                                    <div className="skeleton h-36"></div>
                                    <div className="p-4 bg-white/5">
                                        <div className="flex gap-3 mb-3">
                                            <div className="flex-1 h-16 rounded-2xl skeleton"></div>
                                            <div className="flex-1 h-16 rounded-2xl skeleton" style={{animationDelay:'0.1s'}}></div>
                                            <div className="flex-1 h-16 rounded-2xl skeleton" style={{animationDelay:'0.2s'}}></div>
                                        </div>
                                        <div className="h-12 rounded-2xl skeleton" style={{animationDelay:'0.3s'}}></div>
                                    </div>
                                </div>
                            ) : restaurants.length === 0 ? (
                                <div className="text-center py-16 fade-in" style={{animationDelay:'0.15s'}}>
                                    <p className="text-white/30 text-lg">Add some restaurants to get started</p>
                                </div>
                            ) : browseMode ? (
                                <div className="bg-white/5 rounded-2xl p-5 card-glow slide-up">
                                    <div className="space-y-2 mb-4">
                                        {activeList.map((r, i) => {
                                            const myVote = userVotes[toVoteKey(r)];
                                            return (
                                                <div key={i} className="flex items-center gap-3 bg-white/5 rounded-xl px-4 py-2.5">
                                                    <span className="text-white/30 text-sm w-5 text-right flex-shrink-0">{i + 1}</span>
                                                    <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r)}`}
                                                       target="_blank" rel="noopener noreferrer"
                                                       className="flex-1 text-white/80 text-sm font-medium hover:underline">{r}</a>
                                                    {myVote === 'super' && <span className="text-amber-400 text-xs">★</span>}
                                                    {myVote === true && <span className="text-green-400 text-xs">✓</span>}
                                                    {myVote === false && <span className="text-red-400 text-xs">✗</span>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                    <button onClick={() => setBrowseMode(false)}
                                        className="w-full btn-like text-white py-3 rounded-xl font-semibold text-sm">
                                        Start Voting →
                                    </button>
                                </div>
                            ) : allDone ? (
                                <div className="bg-white/5 rounded-2xl p-10 text-center card-glow slide-up">
                                    <div className="flex items-center justify-center gap-2 mb-2">
                                        <CheckIcon className="w-5 h-5 text-white/20" />
                                        <h3 className="text-white text-xl font-bold">All done!</h3>
                                    </div>
                                    <p className="text-white/40 mb-6">You've voted on all {activeList.length} restaurants.</p>
                                    {matches.length === 0 && (() => {
                                        const total = Object.keys(participants).length;
                                        const counts = activeList.map(r => {
                                            const vals = Object.values(allVotes).map(v => v[toVoteKey(r)]);
                                            return {
                                                name: r,
                                                yes: vals.filter(v => v === true || v === 'super').length,
                                                no: vals.filter(v => v === false).length,
                                                super: vals.filter(v => v === 'super').length,
                                            };
                                        });
                                        const maxYes = Math.max(...counts.map(c => c.yes));
                                        if (maxYes === 0) return null;
                                        const best = counts
                                            .filter(c => c.yes === maxYes)
                                            .sort((a, b) => a.no !== b.no ? a.no - b.no : b.super - a.super);
                                        return (
                                            <div className="mb-6 bg-green-500/10 border border-green-500/20 rounded-xl p-4">
                                                <p className="text-green-400/60 text-sm mb-2">No full match — best partial match{best.length > 1 ? 'es' : ''} ({maxYes}/{total}):</p>
                                                {best.map(b => (
                                                    <div key={b.name} className="mb-2 last:mb-0">
                                                        <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(b.name)}`} target="_blank" rel="noopener noreferrer" className="font-display text-xl text-green-300 font-bold block hover:underline">{b.name}</a>
                                                        {b.super > 0 && (
                                                            <span className="text-amber-400 text-xs">{'★'.repeat(b.super)} {b.super} super like{b.super > 1 ? 's' : ''}</span>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        );
                                    })()}
                                    <div className="flex flex-col gap-3">
                                        {matches.length > 1 && (
                                            <button onClick={narrowDown} className="btn-like text-white px-8 py-3 rounded-xl font-semibold">Narrow It Down</button>
                                        )}
                                        <button onClick={resetVotes} className="btn-primary text-white px-8 py-3 rounded-xl font-semibold">Start Over</button>
                                    </div>
                                </div>
                            ) : (
                                <div
                                    ref={cardRef}
                                    className="relative bg-white/5 rounded-2xl overflow-hidden card-glow slide-up"
                                    style={{
                                        transform: flying === 'yes' ? 'translate(120vw, -8vh) rotate(30deg)'
                                            : flying === 'no' ? 'translate(-120vw, -8vh) rotate(-30deg)'
                                            : flying === 'super' ? 'translate(0, -120vh)'
                                            : `translate(${swipeX}px, ${swipeY}px) rotate(${swipeX * 0.05}deg)`,
                                        opacity: flying ? 0 : 1,
                                        transition: swiping && !flying ? 'none' : 'transform 0.3s ease, opacity 0.3s ease',
                                        touchAction: 'none',
                                    }}
                                >
                                    {(flying || candidate) && (
                                        <div className={`swipe-stamp ${
                                            (flying || candidate) === 'yes' ? 'stamp-yes'
                                            : (flying || candidate) === 'no' ? 'stamp-no' : 'stamp-super'}`}>
                                            {(flying || candidate) === 'yes' ? 'YES' : (flying || candidate) === 'no' ? 'NO' : '★ SUPER'}
                                        </div>
                                    )}
                                    <div className="restaurant-card-bg p-5 text-center">
                                        <p className="text-white/30 text-sm mb-2 tracking-wider uppercase">{votedCount + 1} / {activeList.length}</p>
                                        <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(cur)}`} target="_blank" rel="noopener noreferrer" className="font-display text-4xl text-white mb-2 block hover:underline">{cur}</a>
                                    </div>
                                    {isTouchDevice ? (
                                        <div className="p-4">
                                            <div className="flex items-center justify-center gap-6 text-sm font-medium mb-3">
                                                <span className="text-red-400/80">← No</span>
                                                <span className="text-amber-400/80">↑ Super Like</span>
                                                <span className="text-green-400/80">Yes →</span>
                                            </div>
                                            <button onClick={skip} className="w-full btn-skip text-white/80 py-3 rounded-2xl text-sm font-semibold">
                                                Skip for now
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="p-4">
                                            <div className="flex gap-3 mb-3">
                                                <button onClick={() => vote(false)} className="flex-1 btn-pass text-white py-5 rounded-2xl flex items-center justify-center gap-2 text-lg font-semibold">
                                                    <XIcon className="w-7 h-7" /> No
                                                </button>
                                                <button onClick={skip} className="flex-1 btn-skip text-white py-5 rounded-2xl flex items-center justify-center gap-2 text-lg font-semibold">
                                                    Skip
                                                </button>
                                                <button onClick={() => vote(true)} className="flex-1 btn-like text-white py-5 rounded-2xl flex items-center justify-center gap-2 text-lg font-semibold">
                                                    <HeartIcon className="w-7 h-7" /> Yes
                                                </button>
                                            </div>
                                            <button onClick={() => vote('super')}
                                                className="w-full btn-super text-white py-3 rounded-2xl flex items-center justify-center gap-2 text-base font-semibold">
                                                ★ Super Like
                                            </button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Remove Restaurants */}
                            {restaurants.length > 0 && (
                                <div className="mt-5 fade-in">
                                    <button
                                        onClick={() => setShowRestaurantList(!showRestaurantList)}
                                        className={`w-full bg-white/5 rounded-2xl px-4 py-3 card-glow flex items-center justify-center gap-2 transition-colors ${showRestaurantList ? 'bg-red-500/10 border border-red-500/20' : 'hover:bg-white/8'}`}
                                    >
                                        <TrashIcon className={`w-4 h-4 ${showRestaurantList ? 'text-red-400' : 'text-white/30'}`} />
                                        <span className={`text-sm font-medium ${showRestaurantList ? 'text-red-400' : 'text-white/30'}`}>Remove Restaurants ({restaurants.length})</span>
                                    </button>
                                    {showRestaurantList && (
                                        <div className="bg-white/5 rounded-2xl p-5 mt-3 card-glow fade-in">
                                            <div className="space-y-2">
                                                {restaurants.map((r, i) => (
                                                    <div key={i} className="flex items-center justify-between bg-white/5 rounded-xl px-4 py-2.5">
                                                        <span className="text-white/70 text-sm">{r}</span>
                                                        <button
                                                            onClick={() => deleteRestaurant(r)}
                                                            className="text-white/20 hover:text-red-400 transition-colors"
                                                            title="Remove restaurant"
                                                        >
                                                            <TrashIcon className="w-4 h-4" />
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* One-time swipe tutorial */}
                        {showSwipeHint && cur && (
                            <div className="celebration-overlay" onClick={dismissSwipeHint} style={{cursor:'pointer', background:'rgba(0,0,0,0.85)'}}>
                                <div className="text-center pop-in mx-6 px-8 py-9 rounded-3xl" style={{background:'#1a1a1c', boxShadow:'0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08)'}}>
                                    <h2 className="font-display text-3xl text-white font-bold mb-8">How to vote</h2>
                                    <div className="space-y-5 text-left inline-block">
                                        <p className="text-green-400 text-xl font-semibold">Swipe right → <span className="text-white/80 text-base font-normal ml-2">Yes, I'd eat there</span></p>
                                        <p className="text-red-400 text-xl font-semibold">← Swipe left <span className="text-white/80 text-base font-normal ml-2">No thanks</span></p>
                                        <p className="text-amber-400 text-xl font-semibold">↑ Swipe up <span className="text-white/80 text-base font-normal ml-2">★ Super Like</span></p>
                                    </div>
                                    <p className="text-white/60 text-sm mt-8">Can't decide? Tap "Skip for now" under the card.<br/>Mis-swiped? You get 4 seconds to undo.</p>
                                    <button onClick={dismissSwipeHint} className="btn-primary text-white px-10 py-3 rounded-xl font-semibold mt-8">Got it</button>
                                </div>
                            </div>
                        )}

                        {/* Undo toast after swipe votes */}
                        {undoInfo && (
                            <div className="undo-toast">
                                <span className="truncate">
                                    Voted {undoInfo.value === 'super' ? '★ Super Like' : undoInfo.value === true ? 'Yes' : 'No'} on {undoInfo.restaurant}
                                </span>
                                <button onClick={undoVote} className="text-amber-400 font-bold flex-shrink-0 hover:text-amber-300">Undo</button>
                            </div>
                        )}
                    </div>
                );
            }
        }

        ReactDOM.render(<WinnerDinner />, document.getElementById('root'));
    </script>
</body>
</html>
